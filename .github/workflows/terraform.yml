name: "Terraform CI/CD"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Выберите окружение для развертывания'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - stage
          - prod

# В GitHub Actions глобальные переменные объявляются через блок env, а не variables
env:
  ENV: ${{ github.event.inputs.environment || 'dev' }}
  TF_ROOT: "Task2Advanced/envs/${{ github.event.inputs.environment || 'dev' }}"

jobs:
  terraform_plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
      YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
      YANDEX_CLOUD_ID: ${{ secrets.YANDEX_CLOUD_ID }}
      YANDEX_FOLDER_ID: ${{ secrets.YANDEX_FOLDER_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: |
          cd ${{ env.TF_ROOT }}
          terraform init -backend-config="backend.tfvars"

      - name: Terraform Validate
        run: |
          cd ${{ env.TF_ROOT }}
          terraform validate

      - name: Terraform Plan
        run: |
          cd ${{ env.TF_ROOT }}
          terraform plan -var-file="terraform.tfvars" -out=tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.ENV }}
          path: ${{ env.TF_ROOT }}/tfplan
          retention-days: 2

  terraform_apply:
    name: "Terraform Apply"
    needs: terraform_plan
    # Запускаем apply только при пуше в main или при ручном запуске
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    
    # Динамически подставляем имя GitHub Environment для работы ручного апрува
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
      YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
      YANDEX_CLOUD_ID: ${{ secrets.YANDEX_CLOUD_ID }}
      YANDEX_FOLDER_ID: ${{ secrets.YANDEX_FOLDER_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.ENV }}
          path: ${{ env.TF_ROOT }}

      - name: Terraform Init
        run: |
          cd ${{ env.TF_ROOT }}
          terraform init -backend-config="backend.tfvars"

      - name: Terraform Apply
        run: |
          cd ${{ env.TF_ROOT }}
          terraform apply -input=false tfplan
